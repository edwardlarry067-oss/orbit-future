[build]
  base = "artifacts"
  command = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/spacex-starlink run build"
  publish = "artifacts/spacex-starlink/dist"

[build.environment]
  NODE_VERSION = "20"
  # Required: set this in the Netlify UI → Site Settings → Environment Variables
  # Value should be your deployed API backend URL, e.g. https://your-api.replit.app
  # VITE_API_URL = "https://your-api.replit.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
