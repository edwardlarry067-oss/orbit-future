[build]
  command = "cd artifacts && npm install -g pnpm 2>/dev/null; pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/spacex-starlink run build"
  publish = "artifacts/spacex-starlink/dist"

[build.environment]
  NODE_VERSION = "20"
  # VITE_API_URL — leave empty so API calls go to the same Netlify domain via the /api/* redirect
  VITE_API_URL = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
